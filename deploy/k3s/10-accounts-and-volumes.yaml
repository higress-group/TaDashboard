apiVersion: v1
kind: ServiceAccount
metadata:
  name: hiclaw-dashboard
  namespace: hiclaw-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hiclaw-controller
  namespace: hiclaw-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hiclaw-dashboard-db
  namespace: hiclaw-system
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hiclaw-controller-data
  namespace: hiclaw-system
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiclaw-dashboard
  namespace: hiclaw-system
  labels:
    app.kubernetes.io/name: hiclaw-dashboard
    app.kubernetes.io/part-of: hiclaw
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: hiclaw-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hiclaw-dashboard
        app.kubernetes.io/part-of: hiclaw
    spec:
      serviceAccountName: hiclaw-dashboard
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      initContainers:
        - name: migrate
          image: hiclaw-dashboard:dev
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "db", "push", "--skip-generate", "--accept-data-loss"]
          env:
            - name: DATABASE_URL
              value: "file:/app/db/custom.db"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: db
              mountPath: /app/db
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/nextjs
      containers:
        - name: dashboard
          image: hiclaw-dashboard:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "file:/app/db/custom.db"
            - name: HICLAW_CONTROLLER_URL
              value: "http://hiclaw-controller.hiclaw-system:8090"
            - name: NEXT_PUBLIC_HICLAW_CONTROLLER_URL
              value: "/api/hiclaw"
            - name: HICLAW_AUTH_TOKEN_FILE
              value: "/var/run/secrets/hiclaw/token"
            - name: NEXT_PUBLIC_MATRIX_API_URL
              value: "https://matrix.hiclaw.local"
            - name: NEXT_PUBLIC_MATRIX_TOKEN_PERSIST
              value: "session"
            - name: MATRIX_ALLOWED_HOSTS
              value: "matrix.hiclaw.local,localhost"
          volumeMounts:
            - name: db
              mountPath: /app/db
            - name: tmp
              mountPath: /tmp
            - name: sa-token
              mountPath: /var/run/secrets/hiclaw
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: hiclaw-dashboard-db
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
        - name: sa-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: hiclaw-controller
                  expirationSeconds: 3600
---
apiVersion: v1
kind: Service
metadata:
  name: hiclaw-dashboard
  namespace: hiclaw-system
  labels:
    app.kubernetes.io/name: hiclaw-dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hiclaw-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http